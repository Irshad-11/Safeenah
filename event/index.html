<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event — Safeenah</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;500;600&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ════════════════════════════════════════════════════
   THEME TOKENS
════════════════════════════════════════════════════ */
:root {
  --f-head:    'Libre Baskerville', Georgia, serif;
  --f-body:    'Cormorant Garamond', Georgia, serif;
  --f-label:   'Cinzel', serif;
  --f-bengali: 'Hind Siliguri', sans-serif;
}

/* DARK (default) */
[data-theme="dark"] {
  --bg:          #0d0b09;
  --bg-grad:     radial-gradient(ellipse 80% 50% at 50% 0%, rgba(110,75,10,0.14) 0%, transparent 65%);
  --surface:     #181410;
  --surface2:    #211d15;
  --surface3:    #272218;
  --border:      rgba(160,120,50,0.17);
  --border2:     rgba(160,120,50,0.1);
  --gold:        #c49a30;
  --gold-lt:     #e0b84a;
  --gold-dk:     #8a6518;
  --gold-dim:    rgba(196,154,48,0.1);
  --ink:         #ede0c8;       /* bright headings */
  --ink-body:    #d4c4a8;       /* body prose */
  --ink-sub:     #a89878;       /* muted */
  --ink-mute:    #6a5a42;
  --nav-bg:      rgba(5,4,2,0.97);
  --nav-border:  rgba(140,100,30,0.22);
  --card-shadow: 0 8px 40px rgba(0,0,0,0.65);
  --tag-bg:      rgba(196,154,48,0.08);
  --tag-border:  rgba(138,101,24,0.28);
  --btn-icon:    rgba(200,180,140,0.65);
  --overlay:     rgba(0,0,0,0.88);
  --mode-icon:   '☀';
}

/* LIGHT */
[data-theme="light"] {
  --bg:          #f6ead0;
  --bg-grad:     radial-gradient(ellipse 80% 50% at 50% 0%, rgba(200,160,60,0.1) 0%, transparent 65%);
  --surface:     #fdf6e8;
  --surface2:    #f2e4c2;
  --surface3:    #ece0b8;
  --border:      rgba(140,100,30,0.22);
  --border2:     rgba(140,100,30,0.13);
  --gold:        #9a6e10;
  --gold-lt:     #b88820;
  --gold-dk:     #7a5208;
  --gold-dim:    rgba(160,120,20,0.1);
  --ink:         #1a1006;       /* bright headings */
  --ink-body:    #2e1e08;       /* body prose */
  --ink-sub:     #5a3e18;       /* muted */
  --ink-mute:    #9a7a48;
  --nav-bg:      rgba(240,228,198,0.97);
  --nav-border:  rgba(140,100,30,0.22);
  --card-shadow: 0 6px 32px rgba(140,100,20,0.12);
  --tag-bg:      rgba(140,100,20,0.08);
  --tag-border:  rgba(120,85,15,0.28);
  --btn-icon:    rgba(80,55,20,0.65);
  --overlay:     rgba(0,0,0,0.82);
  --mode-icon:   '☾';
}

/* ════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

body {
  background-color:var(--bg);
  background-image:var(--bg-grad);
  background-attachment:fixed;
  color:var(--ink-body);
  font-family:var(--f-body);
  font-size:18px; line-height:1.75;
  overflow-x:hidden; min-height:100vh;
  transition:background-color 0.3s, color 0.3s;
}

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--gold-dk); border-radius:3px; }

/* Bangla */
.bn,[lang="bn"] { font-family:var(--f-bengali); font-size:1.04em; line-height:1.9; }

/* ════════════════════════════════════════════════════
   NAVBAR
════════════════════════════════════════════════════ */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:900;
  background:var(--nav-bg); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--nav-border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1.75rem; height:52px;
  transition:background 0.3s, border-color 0.3s;
}
.logo {
  font-family:var(--f-label); font-size:0.88rem;
  letter-spacing:0.18em; color:var(--gold); text-decoration:none;
  display:flex; align-items:center; gap:0.5rem;
}
.nav-links { display:flex; gap:1.8rem; align-items:center; }
.nav-a {
  font-family:var(--f-label); font-size:0.78rem;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--ink-sub); text-decoration:none;
  transition:color 0.2s; border-bottom:1px solid transparent; padding-bottom:1px;
}
.nav-a:hover { color:var(--gold); border-bottom-color:rgba(196,154,48,0.4); }

.nav-right { display:flex; align-items:center; gap:1rem; }

/* theme toggle */
.theme-btn {
  background:none; border:1px solid var(--border); border-radius:50px;
  padding:0.22rem 0.65rem; cursor:pointer;
  font-family:var(--f-label); font-size:0.85rem; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--gold-dk);
  transition:all 0.2s; white-space:nowrap;
  display:flex; align-items:center; gap:0.35rem;
}
.theme-btn:hover { border-color:var(--gold); color:var(--gold); }

/* ════════════════════════════════════════════════════
   MOBILE HAMBURGER MENU
════════════════════════════════════════════════════ */
#ham { 
  display: none; 
  background: none; 
  border: none; 
  cursor: pointer; 
  color: var(--btn-icon); 
  padding: 4px; 
}

/* MOBILE MENU - Fixed Position + Theme Support */
#mob {
  display: none;
  position: fixed;
  top: 52px;
  left: 0;
  right: 0;
  background: var(--nav-bg);
  border-bottom: 1px solid var(--nav-border);
  padding: 1.4rem 1.75rem 2rem;
  flex-direction: column;
  gap: 0.6rem;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
  z-index: 950;
  opacity: 0;
  transform: translateY(-15px);
  transition: all 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: calc(100vh - 52px);
  overflow-y: auto;
}

#mob.show {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}

/* Backdrop - Uses your existing --overlay variable (perfect for dark/light) */
#mob.show::after {
  content: '';
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: -1;
  animation: fadeIn 0.3s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Mobile Menu Links - Theme Aware */
#mob .nav-a {
  font-size: 0.8rem;           /* kept your reduced size */
  padding: 0.65rem 0;
  border-bottom: 1px solid var(--border2);
  color: var(--ink-sub);
  text-decoration: none;
  transition: color 0.2s;
}

#mob .nav-a:hover {
  color: var(--gold);
}

#mob .nav-a:last-child {
  border-bottom: none;
}

@media(max-width:640px){ 
  #ham{display:block;} 
  .nav-links{display:none;} 
}

/* ════════════════════════════════════════════════════
   BANNER
════════════════════════════════════════════════════ */
.banner-wrap {
  width:100%; height:clamp(200px,36vw,460px);
  position:relative; overflow:hidden; margin-top:52px;
}
.banner-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:filter 0.3s;
}
[data-theme="dark"]  .banner-wrap img { filter:brightness(0.75) saturate(0.7); }
[data-theme="light"] .banner-wrap img { filter:brightness(0.88) saturate(0.85); }

.banner-wrap::after {
  content:''; position:absolute; inset:0; pointer-events:none;
}
[data-theme="dark"] .banner-wrap::after {
  background:
    linear-gradient(to top, #0d0b09 0%, rgba(13,11,9,0.08) 48%, transparent 100%),
    linear-gradient(to right, rgba(13,11,9,0.3) 0%, transparent 18%, transparent 82%, rgba(13,11,9,0.3) 100%);
}
[data-theme="light"] .banner-wrap::after {
  background:
    linear-gradient(to top, #f6ead0 0%, rgba(246,234,208,0.06) 48%, transparent 100%);
}

/* ════════════════════════════════════════════════════
   PAGE WRAPPER
════════════════════════════════════════════════════ */
.page-wrap {
  max-width:1080px; margin:0 auto;
  padding:0 1.5rem 5rem;
  margin-top:-4.5rem;
  position:relative; z-index:2;
}

/* back button */
.back-btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  font-family:var(--f-label); font-size:0.58rem;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--gold-dk); text-decoration:none;
  border:1px solid var(--border);
  padding:0.28rem 0.75rem; border-radius:1px;
  transition:all 0.2s;
}
.back-btn:hover { border-color:var(--gold); color:var(--gold); }

/* ════════════════════════════════════════════════════
   TWO COLUMN
════════════════════════════════════════════════════ */
.layout {
  display:grid;
  grid-template-columns:1fr 280px;
  gap:1.6rem; align-items:start;
}
@media(max-width:860px) { .layout { grid-template-columns:1fr; } }

/* ════════════════════════════════════════════════════
   MAIN CONTENT CARD
════════════════════════════════════════════════════ */
.content-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  padding:clamp(1.4rem,4vw,2.4rem);
  box-shadow:var(--card-shadow);
  transition:background 0.3s, border-color 0.3s, box-shadow 0.3s;
}

/* meta row */
.ev-meta {
  display:flex; align-items:center; gap:0.65rem;
  flex-wrap:wrap; margin-bottom:0.85rem;
}
.year-badge {
  font-family:var(--f-label); font-size: 0.8rem;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--gold-dk); border:1px solid var(--border);
  padding:0.18rem 0.72rem; border-radius:50px;
}

/* ── META ROW ── */
.ev-meta {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 0.9rem;
}

.meta-sep {
  color: var(--ink-mute);
  font-size: 0.65rem;
  line-height: 1;
  user-select: none;
}

.meta-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-family: var(--f-label);
  font-size: 0.54rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-sub);
}

.meta-chip svg {
  color: var(--gold-dk);
  flex-shrink: 0;
}

.meta-chip.author { color: var(--gold-dk); }


.meta-dot { color:var(--ink-mute); font-size:0.7rem; }
.meta-text {
  font-family:var(--f-label); font-size:0.55rem;
  letter-spacing:0.12em; color:var(--ink-sub);
}

/* title */
.ev-title {
  font-family:var(--f-head);
  font-size:clamp(1.5rem,3.6vw,2.2rem);
  font-weight:700; color:var(--ink);
  line-height:1.2; letter-spacing:0.005em;
  margin-bottom:0.5rem;
}
/* Bangla title */
.ev-title.bn { font-family:var(--f-bengali); font-size:clamp(1.4rem,3.2vw,2rem); }

/* subtitle */
.ev-subtitle {
  font-family:var(--f-body);
  font-size:1.08rem; font-style:italic;
  color:var(--ink-sub); line-height:1.5;
  margin-bottom:1.1rem; letter-spacing:0.01em;
}

/* summary */
.ev-summary {
  font-family:var(--f-body);
  font-size:1.08rem; line-height:1.78;
  color:var(--ink-body); margin-bottom:1.5rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--border2);
}

/* divider */
.rule {
  display:flex; align-items:center; gap:0.75rem; margin:1.5rem 0;
}
.rule::before,.rule::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
}
.rule span { font-size:0.6rem; color:var(--ink-mute); }

/* ════════════════════════════════════════════════════
   BODY PROSE
════════════════════════════════════════════════════ */
.ev-body { font-family:var(--f-body); color:var(--ink-body); }

.ev-body p {
  font-size:1.1rem; line-height:1.88;
  color:var(--ink-body); margin-bottom:1.2rem; letter-spacing:0.01em;
}
.ev-body p:last-child { margin-bottom:0; }

.ev-body blockquote {
  border-left:2.5px solid var(--gold);
  margin:1.6rem 0; padding:0.8rem 1.35rem;
  background:var(--gold-dim);
  border-radius:0 2px 2px 0;
}
.ev-body blockquote p,
.ev-body blockquote {
  font-family:var(--f-head); font-style:italic;
  font-size:1.05rem; line-height:1.75;
  color:var(--ink); margin-bottom:0;
}

.ev-body h2 {
  font-family:var(--f-head); font-size:1.65rem; font-weight:700;
  color:var(--ink);
  margin:2rem 0 0.6rem; line-height:1.3;
}
.ev-body h3 {
  font-family:var(--f-label); font-weight:500;
   text-transform:uppercase;
  color:var(--gold-dk); margin:1.6rem 0 0.5rem;
}
.ev-body em     { font-style:italic; color:var(--ink); }
.ev-body strong { font-weight:700; color:var(--ink); }
.ev-body a {
  color:var(--gold); text-decoration:none;
  border-bottom:1px solid rgba(196,154,48,0.3); transition:border-color 0.2s;
}
.ev-body a:hover { border-bottom-color:var(--gold); }
.ev-body ul,.ev-body ol { padding-left:1.5rem; margin-bottom:1.2rem; }
.ev-body li {
  font-size:1.05rem; color:var(--ink-body);
  line-height:1.75; margin-bottom:0.3rem;
}
.ev-body .bn,[lang="bn"] {
  font-family:var(--f-bengali); font-size:1.04rem; line-height:1.92; color:var(--ink-body);
}
.ev-body .ar,[lang="ar"] {
  direction:rtl; text-align:right; display:block;
  font-size:1.28rem; line-height:2; color:var(--gold-lt); margin:1.2rem 0;
}

/* ════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════ */
.side-col {
  display:flex; flex-direction:column; gap:1rem;
  position:sticky; top:calc(52px + 1.25rem);
}

.widget {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.35);
  transition:background 0.3s, border-color 0.3s;
}
.widget-head {
  display:flex; align-items:center; gap:0.45rem;
  padding:0.52rem 0.95rem;
  background:var(--surface2);
  border-bottom:1px solid var(--border2);
  font-family:var(--f-label); font-size:0.7rem;
  letter-spacing:0.1em; text-transform:uppercase;
  /* color:var(--gold-dk); */
  transition:background 0.3s;
}
.widget-body { padding:0.75rem 0.95rem; }

/* ── IMAGES ── */
.img-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:0.4rem;
  padding:0.5rem;
}
.img-thumb {
  aspect-ratio:1; border-radius:2px; overflow:hidden;
  border:1px solid var(--border2); cursor:pointer;
  transition:transform 0.2s, border-color 0.2s;
  position:relative;
}
.img-thumb:hover { transform:scale(1.03); border-color:var(--gold); }
.img-thumb img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:filter 0.3s;
}
[data-theme="dark"]  .img-thumb img { filter:brightness(0.82) saturate(0.75); }
[data-theme="light"] .img-thumb img { filter:brightness(0.92) saturate(0.9); }
.img-thumb:hover img { filter:brightness(1) saturate(1)!important; }

.img-caption {
  font-family:var(--f-body); font-size:0.7rem;
  color:var(--ink-sub); padding:0 0.5rem 0.4rem; line-height:1.4;
  display:none;
}
.img-caption.show { display:block; }

/* show-more toggle */
.img-more-btn {
  display:block; width:100%; padding:0.4rem;
  background:none; border:none; border-top:1px solid var(--border2);
  cursor:pointer; font-family:var(--f-label); font-size:0.55rem;
  letter-spacing:0.15em; text-transform:uppercase; color:var(--gold-dk);
  transition:color 0.2s; text-align:center;
}
.img-more-btn:hover { color:var(--gold); }
.img-hidden { display:none; }
.img-hidden.open { display:contents; }

/* ── LIGHTBOX ── */
#lightbox {
  display:none; position:fixed; inset:0; z-index:9000;
  background:var(--overlay); align-items:center; justify-content:center;
  flex-direction:column; gap:0.75rem;
  backdrop-filter:blur(8px);
}
#lightbox.open { display:flex; }
#lightbox img {
  max-width:min(90vw,960px); max-height:80vh;
  object-fit:contain; border-radius:2px;
  box-shadow:0 16px 64px rgba(0,0,0,0.8);
}
#lightbox-caption {
  font-family:var(--f-body); font-size:0.88rem;
  color:rgba(232,220,200,0.75); text-align:center;
  max-width:600px; line-height:1.5;
}
.lb-actions {
  display:flex; gap:0.65rem;
}
.lb-btn {
  display:inline-flex; align-items:center; gap:0.35rem;
  font-family:var(--f-label); font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase;
  padding:0.38rem 0.85rem; border-radius:1px; cursor:pointer;
  text-decoration:none; transition:all 0.2s; border:1px solid rgba(232,220,200,0.3);
  color:rgba(232,220,200,0.8); background:rgba(255,255,255,0.06);
}
.lb-btn:hover { border-color:var(--gold-lt); color:var(--gold-lt); background:rgba(196,154,48,0.1); }

/* ── SOURCES ── */
.src-item {
  display:flex; align-items:flex-start; gap:0.45rem;
  padding:0.5rem 0; border-bottom:1px solid var(--border2);
  text-decoration:none; transition:background 0.2s;
  border-radius:1px;
}
.src-item:last-child { border-bottom:none; }
.src-item:focus-visible, .src-item:active {
  outline:none;
  border:1px solid var(--gold); padding:0.5rem 0.3rem; border-radius:2px;
}
.src-text {
  font-family:var(--f-body); font-size:0.9rem;
  color:var(--ink-sub); line-height:1.45; flex:1;
}
.src-item:hover .src-text { color:var(--gold); }

/* ── RELATED HADITH ── */
.rel-h-item {
  display:flex; align-items:flex-start; gap:0.45rem;
  padding:0.5rem 0; border-bottom:1px solid var(--border2);
  text-decoration:none; transition:color 0.2s;
}
.rel-h-item:last-child { border-bottom:none; }
.rel-h-text {
  font-family:var(--f-body); font-size:0.9rem;
  color:var(--ink-sub); line-height:1.45; flex:1;
}
.rel-h-item:hover .rel-h-text { color:var(--gold); }

/* ── ACTIONS (share, copy, submit) ── */
.action-row {
  display:flex; flex-direction:column; gap:0.5rem;
}
.action-btn {
  display:flex; align-items:center; gap:0.5rem;
  padding:0.45rem 0.75rem; border-radius:2px; cursor:pointer;
  font-family:var(--f-label); font-size:0.57rem; letter-spacing:0.12em; text-transform:uppercase;
  border:1px solid var(--border); color:var(--ink-sub); background:none;
  text-decoration:none; transition:all 0.2s;
}
.action-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.copy-ok {
  font-family:var(--f-body); font-size:0.8rem; color:var(--gold);
  display:none; padding:0.2rem 0;
}

/* ════════════════════════════════════════════════════
   MORE EVENTS (bottom)
════════════════════════════════════════════════════ */
.more-section { margin-top:2.5rem; }
.more-head {
  display:flex; align-items:center; gap:0.8rem; margin-bottom:1.2rem;
}
.more-head::before,.more-head::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
}
.more-head span {
  font-family:var(--f-label); font-size:0.7rem;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--gold-dk);
  white-space:nowrap;
}

.more-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:1rem;
}

.more-card {
  display:flex; flex-direction:column;
  text-decoration:none; background:var(--surface);
  border:1px solid var(--border); border-radius:3px; overflow:hidden;
  transition:transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  box-shadow:0 3px 14px rgba(0,0,0,0.3);
}
.more-card:hover {
  transform:translateY(-3px);
  border-color:var(--gold-dk);
  box-shadow:0 8px 28px rgba(0,0,0,0.45);
}
.more-card-img {
  width:100%; aspect-ratio:16/9; object-fit:cover;
  display:block;
}
[data-theme="dark"]  .more-card-img { filter:brightness(0.8) saturate(0.7); }

}

<script>
/* ═══════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════ */
const savedTheme = localStorage.getItem('sf-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeBtn(savedTheme);

function toggleTheme() {
  const cur  = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sf-theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  const lbl = document.getElementById('themeLbl');
  if (lbl) lbl.textContent = theme === 'dark' ? 'Light' : 'Dark';
}

/* ═══════════════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════════════ */
function openLB(src, caption) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-img').alt = caption || '';
  document.getElementById('lb-cap').textContent = caption || '';
  document.getElementById('lb-dl').href = src;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLB();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

/* ═══════════════════════════════════════════════════════
   SHOW-MORE IMAGES
═══════════════════════════════════════════════════════ */
let imgMoreOpen = false;
function toggleMoreImgs() {
  imgMoreOpen = !imgMoreOpen;
  const g = document.getElementById('imgGridMore');
  const b = document.getElementById('imgMoreBtn');
  g.style.display = imgMoreOpen ? 'grid' : 'none';
  b.textContent   = imgMoreOpen ? 'Show fewer ▴' : `Show more images ▾`;
}

/* ═══════════════════════════════════════════════════════
   COPY LINK
═══════════════════════════════════════════════════════ */
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const el = document.getElementById('copyOk');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2400);
  });
}


/* ═══════════════════════════════════════════════════════
   MOBILE MENU - Hamburger
═══════════════════════════════════════════════════════ */
const ham = document.getElementById('ham');
const mob = document.getElementById('mob');

function openMobileMenu() {
  mob.classList.add('show');
  ham.setAttribute('aria-expanded', 'true');
  document.body.style.overflow = 'hidden';
}

function closeMobileMenu() {
  mob.classList.remove('show');
  ham.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}

function toggleMobileMenu() {
  if (mob.classList.contains('show')) {
    closeMobileMenu();
  } else {
    openMobileMenu();
  }
}

// Hamburger Click
ham.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMobileMenu();
});

// Click outside to close
document.addEventListener('click', (e) => {
  if (!mob.contains(e.target) && !ham.contains(e.target)) {
    closeMobileMenu();
  }
});

// Close when clicking menu links
mob.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', closeMobileMenu);
});

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && mob.classList.contains('show')) {
    closeMobileMenu();
  }
});


/* ═══════════════════════════════════════════════════════
   UTILITY FUNCTIONS
═══════════════════════════════════════════════════════ */
function qp(k) { 
  return new URLSearchParams(location.search).get(k) || ''; 
}

function parseYear(str) {
  if (typeof str === 'number') return str;
  const s = String(str||'').toLowerCase();
  const n = parseFloat(s.replace(/[^0-9.\-]/g,'')) || 0;
  return (s.includes('bh')||s.includes('bce')||s.includes('bc')) ? -Math.abs(n) : n;
}

function x(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


/* ═══════════════════════════════════════════════════════
   DATA  — same file list as timeline
═══════════════════════════════════════════════════════ */
const DATA_BASE   = '../data/events/';
const EVENT_FILES = [
    'history-of-shawahid-al-tanzil.json',
    'hujor-ibn-ali-o-sathi-der-hotta-kando.json',
    'imam-ali-er-namer-shesh-e-ah.json',
    'imam-husayn-ah-long-speech.json',
    'mimbar_theke_ali_ke_gali_protha.json',
    'rasuler_bongshodhor_hajjajer_oswikar.json'
];

async function loadAll() {
  const results = await Promise.allSettled(
    EVENT_FILES.map(async f => {
      const r = await fetch(DATA_BASE + f, { cache:'no-cache' });
      if (!r.ok) throw 0;
      const d = await r.json();
      return Array.isArray(d) ? d : [d];
    })
  );
  const events = results.filter(r => r.status==='fulfilled').flatMap(r => r.value);
  if (events.length) return events;

  
}

/* ═══════════════════════════════════════════════════════
   BUILD IMAGE GRID
═══════════════════════════════════════════════════════ */
const SHOW_FIRST = 4; /* show first N without "show more" */

function buildImages(images) {
  if (!images || !images.length) return;
  const widget = document.getElementById('wImg');
  const grid   = document.getElementById('imgGrid');
  const more   = document.getElementById('imgMore');
  const mGrid  = document.getElementById('imgGridMore');
  const mBtn   = document.getElementById('imgMoreBtn');

  widget.style.display = '';

  const primary   = images.slice(0, SHOW_FIRST);
  const secondary = images.slice(SHOW_FIRST);

  primary.forEach(img => grid.appendChild(makeThumb(img)));

  if (secondary.length) {
    more.style.display = '';
    secondary.forEach(img => mGrid.appendChild(makeThumb(img)));
    mBtn.textContent = `Show ${secondary.length} more image${secondary.length > 1 ? 's' : ''} ▾`;
  }
}

function makeThumb(img) {
  const div = document.createElement('div');
  div.className = 'img-thumb';
  div.title     = img.text || '';
  div.onclick   = () => openLB(img.url, img.text);

  const im  = document.createElement('img');
  im.src    = img.url || '';
  im.alt    = img.text || '';
  im.loading = 'lazy';

  div.appendChild(im);
  return div;
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
async function init() {
  const slug = qp('id') || qp('slug');
  const all  = await loadAll();
  const ev   = all.find(e => (e.slug||e.id) === slug);

  document.getElementById('st-load').style.display = 'none';

  if (!ev) {
    document.getElementById('st-404').style.display = 'flex';
    return;
  }

  document.title = (ev.title || 'Event') + ' — Safeenah';

  /* banner */
  const bi = document.getElementById('bannerImg');
  bi.src = ev.banner || ev.thumb || '';
  bi.alt = ev.title || '';

  /* meta */
  /* ── meta ── */
document.getElementById('yearBadge').textContent = ev.year || '';

if (ev.author) {
  document.getElementById('metaAuthorText').textContent = ev.author;
  document.getElementById('metaAuthor').style.display = '';
  document.getElementById('sepAuthor').style.display  = '';
}

if (ev.published) {
  document.getElementById('metaDateText').textContent = ev.published;
  document.getElementById('metaDate').style.display = '';
  document.getElementById('sepDate').style.display  = '';
}

  /* title — detect Bangla */
  const titleEl = document.getElementById('evTitle');
  titleEl.textContent = ev.title || '';
  if (/[\u0980-\u09FF]/.test(ev.title || '')) titleEl.classList.add('bn');

  /* subtitle */
  if (ev.subTitle) {
    const st = document.getElementById('evSubtitle');
    st.textContent   = ev.subTitle;
    st.style.display = '';
  }

  /* summary */
  document.getElementById('evSummary').textContent = ev.summary || '';

  /* description */
  document.getElementById('evBody').innerHTML = ev.description || '';

  /* images */
  if (ev.images && ev.images.filter(i => i.url).length) {
    buildImages(ev.images.filter(i => i.url));
  }

  /* related hadith */
  if (ev.hadiths && ev.hadiths.length) {
    const wh = document.getElementById('wHadith');
    const hl = document.getElementById('hadithList');
    wh.style.display = '';
    ev.hadiths.forEach(h => {
      const a = document.createElement('a');
      a.href      = h.url || '#';
      a.target    = '_blank';
      a.rel       = 'noopener noreferrer';
      a.className = 'rel-h-item';
      a.innerHTML = `
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
             style="color:var(--gold-dk);margin-top:3px;flex-shrink:0;">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span class="rel-h-text">${x(h.text)}</span>`;
      hl.appendChild(a);
    });
  }

  /* sources */
  if (ev.sources && ev.sources.length) {
    const ws = document.getElementById('wSrc');
    const sl = document.getElementById('srcList');
    ws.style.display = '';
    ev.sources.forEach(s => {
      const a = document.createElement('a');
      a.href      = s.url || '#';
      a.target    = '_blank';
      a.rel       = 'noopener noreferrer';
      a.className = 'src-item';
      a.innerHTML = `
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
             style="color:var(--gold-dk);margin-top:3px;flex-shrink:0;">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span class="src-text">${x(s.text)}</span>`;
      sl.appendChild(a);
    });
  }

  /* more events (bottom) — all except current, max 8 */
  const others = all.filter(e => (e.slug||e.id) !== slug).slice(0, 8);
  if (others.length) {
    const ms = document.getElementById('moreSection');
    const mg = document.getElementById('moreGrid');
    ms.style.display = '';
    others.forEach(r => {
      const a = document.createElement('a');
      a.href      = `index.html?id=${encodeURIComponent(r.slug||r.id)}`;
      a.className = 'more-card';

      const imgSrc = r.thumb || r.banner || '';
      a.innerHTML = `
        ${imgSrc ? `<img src="${x(imgSrc)}" alt="${x(r.title)}" class="more-card-img" loading="lazy"/>` : ''}
        <div class="more-card-body">
          <div class="more-card-year">${x(r.year||'')}</div>
          <div class="more-card-title">${x(r.title||'')}</div>
          ${r.summary ? `<div class="more-card-summary">${x(r.summary)}</div>` : ''}
        </div>`;
      mg.appendChild(a);
    });
  }

  /* show */
  document.getElementById('st-ev').style.display = '';
}



init();
</script>
</body>
</html>
